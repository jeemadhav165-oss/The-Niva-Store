<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Shop.Niva</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="nav">
        <div class="container">
            <div class="nav-logo"><a href="index.html">Shop.Niva</a></div>
        </div>
    </nav>

    <section class="page-section">
        <div class="container">
            <h1>My Orders</h1>
            <div class="orders-list">
                <div class="order-card">
                    <div class="order-header">
                        <h3>Order #SN1234567</h3>
                        <span class="order-status status-shipped">Shipped</span>
                    </div>
                    <p>Placed on: March 1, 2026</p>
                    <p>Total: ₹1,299</p>
                    <button class="btn btn-outline">Track Order</button>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container"><p>&copy; 2026 Shop.Niva</p></div>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
