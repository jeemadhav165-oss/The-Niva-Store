<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Shop.Niva</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="nav">
        <div class="container">
            <div class="nav-logo"><a href="index.html">Shop.Niva</a></div>
        </div>
    </nav>

    <section class="checkout-section">
        <div class="container">
            <h1>Checkout</h1>
            <div class="checkout-layout">
                <div class="checkout-form">
                    <form id="checkoutForm">
                        <div class="form-section">
                            <h3>Shipping Information</h3>
                            <input type="text" placeholder="Full Name" required>
                            <input type="email" placeholder="Email" required>
                            <input type="tel" placeholder="Phone Number" required>
                            <textarea placeholder="Shipping Address" required></textarea>
                            <div class="form-row">
                                <input type="text" placeholder="City" required>
                                <input type="text" placeholder="Pincode" required>
                            </div>
                        </div>
                        <div class="form-section">
                            <h3>Payment Method</h3>
                            <label><input type="radio" name="payment" value="cod" checked> Cash on Delivery</label>
                            <label><input type="radio" name="payment" value="online"> Online Payment</label>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Place Order</button>
                    </form>
                </div>
                <div class="order-summary">
                    <h3>Order Summary</h3>
                    <div id="checkoutItems"></div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="checkoutTotal">₹0</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container"><p>&copy; 2026 Shop.Niva</p></div>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
